{% extends "header.html" %}
{% block check %}
<input type="checkbox" id="switch" class="switch-input" checked onclick="location.href='http://127.0.0.1:5000'">
{% endblock check %}
{% block section %}
{% include 'nav_service.html' %}
<section id="question_submit">
    <div class="submit-container">
        <h1 class="submit-header">질문 등록</h1>
        <form action="/add_question" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="title">제목</label>
                <input type="text" id="title" name="title" required>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="content">내용</label>
                <textarea id="content" name="content" rows="5" required></textarea>
            </div>
            <button type="button" id="submitQuestion">등록</button>
        </form>
    </div>
</section>
{% endblock section %}
